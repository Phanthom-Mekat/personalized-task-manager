<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="cyber-grad-1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cyber-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="cyber-grad-3" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Solid background for PWA adaptive/maskable clipping -->
  <rect width="100" height="100" fill="#090d16" />

  <!-- Möbius loop and core scaled down by 0.8 and centered (translate to x=10, y=10) to ensure the 10% safe zone boundary is completely clear of visual contents -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- Glowing background halo -->
    <circle cx="50" cy="50" r="30" fill="url(#cyber-grad-1)" opacity="0.15" />

    <!-- The Möbius loop segments representing dynamic workflow cycles & intelligence loops -->
    <path d="M30 65 C15 50, 15 30, 35 30 C55 30, 45 70, 65 70 C85 70, 85 50, 70 35" stroke="url(#cyber-grad-1)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
    <path d="M65 35 C75 45, 80 55, 65 65 C50 75, 45 45, 35 35" stroke="url(#cyber-grad-2)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

    <!-- The Central Spark Core (representing the AI GPT Engine) -->
    <path d="M50 38 C50 45, 45 50, 38 50 C45 50, 50 55, 50 62 C50 55, 55 50, 62 50 C55 50, 50 45, 50 38 Z" fill="url(#cyber-grad-3)" />
    
    <!-- Micro accent nodes -->
    <circle cx="35" cy="30" r="3" fill="#ffffff" />
    <circle cx="65" cy="70" r="3" fill="#ffffff" />
  </g>
</svg>
